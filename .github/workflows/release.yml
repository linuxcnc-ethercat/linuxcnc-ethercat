---
name: Release

on:
    push:
        tags: ['v*']

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        container:
            image: debian:trixie
        steps:
            - name: Install build dependencies
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends \
                      git build-essential devscripts debhelper \
                      linuxcnc-uspace-dev \
                      golang-go yapps2 \
                      autoconf automake libtool pkg-config

            - name: Build and install EtherCAT master headers
              run: |
                  git clone --depth 1 --branch stable-1.6 https://gitlab.com/etherlab.org/ethercat.git /tmp/ethercat
                  cd /tmp/ethercat
                  ./bootstrap
                  ./configure --prefix=/usr --disable-kernel --disable-eoe
                  make -j$(nproc)
                  make install

            - name: Checkout
              uses: actions/checkout@v4

            - name: Build deb package
              run: |
                  touch TODO
                  dpkg-buildpackage -d -us -uc -b

            - name: Run tests
              run: |
                  cd src
                  make test

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      ../*.deb
                      !../*-dbgsym*.deb
                  generate_release_notes: true
