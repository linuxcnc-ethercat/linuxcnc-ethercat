---
name: Build CI

on:
    push:
        branches: ['**']
    pull_request:
    release:
        types: [published]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build-deb:
        name: ${{ matrix.distro }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                distro: [debian-11, debian-12, debian-13]
                include:
                    # linuxcnc_org_repo: build against linuxcnc.org's
                    # linuxcnc-uspace-dev instead of Debian main. Needed on
                    # bullseye (no linuxcnc in Debian 11) and bookworm (only
                    # a 2023 2.9.0~pre1 snapshot). Trixie builds against
                    # Debian's own 1:2.9.4 so the generated shlibs dep is
                    # installable on stock Debian without third-party repos.
                    - distro: debian-11
                      image: debian:bullseye
                      codename: bullseye
                      linuxcnc_org_repo: true
                    - distro: debian-12
                      image: debian:bookworm
                      codename: bookworm
                      linuxcnc_org_repo: true
                    - distro: debian-13
                      image: debian:trixie
                      codename: trixie
                      linuxcnc_org_repo: false

        container:
            image: ${{ matrix.image }}

        steps:
            - name: Install build dependencies
              env:
                  DEBIAN_FRONTEND: noninteractive
                  CODENAME: ${{ matrix.codename }}
                  LINUXCNC_ORG_REPO: ${{ matrix.linuxcnc_org_repo }}
              run: |
                  set -e
                  echo 'Acquire::Retries "10";' > /etc/apt/apt.conf.d/80-retries
                  echo 'Acquire::http::Timeout "30";' >> /etc/apt/apt.conf.d/80-retries
                  apt-get update
                  apt-get install -y --no-install-recommends ca-certificates curl gpg
                  # EtherCAT (libethercat-dev) comes from our own apt repo
                  # instead of the OpenSUSE science:/EtherLab builds.
                  curl -fsSL "https://linuxcnc-ethercat.github.io/apt/linuxcnc-ethercat-apt.gpg" \
                      -o /usr/share/keyrings/linuxcnc-ethercat-apt.gpg
                  echo "deb [signed-by=/usr/share/keyrings/linuxcnc-ethercat-apt.gpg] https://linuxcnc-ethercat.github.io/apt/ ${CODENAME} main" \
                      > /etc/apt/sources.list.d/linuxcnc-ethercat.list
                  if [ "${LINUXCNC_ORG_REPO}" = "true" ]; then
                      # Two LinuxCNC signing keys are in use:
                      # - 3CB9FD148F374FEF: old DSA key, signs bullseye/bookworm
                      # - E43B5A8E78CC2927: 2025-10 RSA key, signs trixie
                      { curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xEEDD0D29F81DCAA0D258661F3CB9FD148F374FEF"; \
                        curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x0CE3E44425B11F871BBCC6F5E43B5A8E78CC2927"; } \
                          | gpg --dearmor -o /usr/share/keyrings/linuxcnc.gpg
                      echo "deb [signed-by=/usr/share/keyrings/linuxcnc.gpg] https://www.linuxcnc.org/ ${CODENAME} base 2.9-uspace" \
                          > /etc/apt/sources.list.d/linuxcnc.list
                  fi
                  apt-get update
                  apt-get install -y --no-install-recommends \
                      git build-essential devscripts debhelper \
                      linuxcnc-uspace-dev libethercat-dev yapps2

            - name: Checkout
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Mark repo as safe (container runs as root)
              run: git config --global --add safe.directory "$PWD"

            - name: Stamp CI version
              run: |
                  # CI builds aren't published to the apt repo, so we just
                  # need a parseable version. Force-bump via -b to bypass
                  # dch's monotonic check (git describe on a feature branch
                  # often sorts below the canonical changelog version).
                  ver=$(git describe --tags --always | sed 's/^v//')
                  dch -b --newversion "${ver}+ci" --distribution stable "CI build ${ver}"

            - name: Build deb package
              run: |
                  touch TODO
                  dpkg-buildpackage -d -us -uc -b
                  mkdir -p dist
                  for src in ../*.deb; do
                      [ -f "$src" ] || continue
                      case "$src" in *-dbgsym*) continue ;; esac
                      fname="$(basename "$src")"
                      base="${fname%_*.deb}"
                      suffix="${fname##*_}"
                      cp "$src" "dist/${base}_${{ matrix.distro }}_${suffix}"
                  done

            - name: Run tests
              run: |
                  cd src
                  make test

            - name: Upload deb artifact
              uses: actions/upload-artifact@v7
              with:
                  name: linuxcnc-ethercat-deb-${{ matrix.distro }}
                  path: dist/*.deb
                  if-no-files-found: error
