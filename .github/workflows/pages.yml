---
# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
    push:
        branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
  # Build job
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Run doxygen
              uses: mattnotmitt/doxygen-action@1.9.5
              with:
                  doxyfile-path: ./.doxyfile
            - name: Stage repo-root pages
              # Copy README.md and CONTRIBUTING.md into the Jekyll source
              # so they render as part of the site instead of bouncing the
              # reader back to GitHub. Jekyll won't process .md files
              # without YAML frontmatter, so prepend a stub. README's
              # internal links to documentation/foo.md also need their
              # prefix stripped because the copy ends up inside
              # documentation/ already.
              run: |
                  for f in README.md CONTRIBUTING.md; do
                    { printf -- '---\nlayout: default\n---\n'; cat "$f"; } > "documentation/$f"
                  done
                  sed -i 's|documentation/\([^)]*\.md\)|\1|g' documentation/README.md
            - name: Setup Pages
              uses: actions/configure-pages@v4
            - name: Build with Jekyll
              uses: actions/jekyll-build-pages@v1
              with:
                  source: ./documentation/
                  destination: ./_site
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3

  # Deployment job
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
