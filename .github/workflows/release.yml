---
name: Release

on:
    push:
        tags: ['v*']

permissions:
    contents: write

jobs:
    build:
        name: ${{ matrix.distro }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                distro: [debian-11, debian-12, debian-13]
                include:
                    # linuxcnc_org_repo: build against linuxcnc.org's
                    # linuxcnc-uspace-dev instead of Debian main. Needed on
                    # bullseye (no linuxcnc in Debian 11) and bookworm (only
                    # a 2023 2.9.0~pre1 snapshot). Trixie builds against
                    # Debian's own 1:2.9.4 so the generated shlibs dep is
                    # installable on stock Debian without third-party repos.
                    - distro: debian-11
                      image: debian:bullseye
                      codename: bullseye
                      deb_rev: deb11u1
                      linuxcnc_org_repo: true
                    - distro: debian-12
                      image: debian:bookworm
                      codename: bookworm
                      deb_rev: deb12u1
                      linuxcnc_org_repo: true
                    - distro: debian-13
                      image: debian:trixie
                      codename: trixie
                      deb_rev: deb13u1
                      linuxcnc_org_repo: false

        container:
            image: ${{ matrix.image }}

        steps:
            - name: Install build dependencies
              env:
                  DEBIAN_FRONTEND: noninteractive
                  CODENAME: ${{ matrix.codename }}
                  LINUXCNC_ORG_REPO: ${{ matrix.linuxcnc_org_repo }}
              run: |
                  set -e
                  echo 'Acquire::Retries "10";' > /etc/apt/apt.conf.d/80-retries
                  echo 'Acquire::http::Timeout "30";' >> /etc/apt/apt.conf.d/80-retries
                  apt-get update
                  apt-get install -y --no-install-recommends ca-certificates curl gpg
                  # EtherCAT (libethercat-dev) comes from our own apt repo
                  # instead of the OpenSUSE science:/EtherLab builds.
                  curl -fsSL "https://linuxcnc-ethercat.github.io/apt/linuxcnc-ethercat-apt.gpg" \
                      -o /usr/share/keyrings/linuxcnc-ethercat-apt.gpg
                  echo "deb [signed-by=/usr/share/keyrings/linuxcnc-ethercat-apt.gpg] https://linuxcnc-ethercat.github.io/apt/ ${CODENAME} main" \
                      > /etc/apt/sources.list.d/linuxcnc-ethercat.list
                  if [ "${LINUXCNC_ORG_REPO}" = "true" ]; then
                      # Two LinuxCNC signing keys are in use:
                      # - 3CB9FD148F374FEF: old DSA key, signs bullseye/bookworm
                      # - E43B5A8E78CC2927: 2025-10 RSA key, signs trixie
                      { curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xEEDD0D29F81DCAA0D258661F3CB9FD148F374FEF"; \
                        curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x0CE3E44425B11F871BBCC6F5E43B5A8E78CC2927"; } \
                          | gpg --dearmor -o /usr/share/keyrings/linuxcnc.gpg
                      echo "deb [signed-by=/usr/share/keyrings/linuxcnc.gpg] https://www.linuxcnc.org/ ${CODENAME} base 2.9-uspace" \
                          > /etc/apt/sources.list.d/linuxcnc.list
                  fi
                  apt-get update
                  apt-get install -y --no-install-recommends \
                      git build-essential devscripts debhelper \
                      linuxcnc-uspace-dev libethercat-dev yapps2

            - name: Checkout
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Mark repo as safe (container runs as root)
              run: git config --global --add safe.directory "$PWD"

            - name: Stamp version with codename suffix
              run: |
                  # Read the canonical version from debian/changelog so the
                  # codename suffix lands in the Debian revision (e.g.
                  # 1.41.0-2+deb13u1), not inside the upstream string. Using
                  # the git tag verbatim once produced versions like
                  # 1.41.0+deb13u1 (no debian revision), which dpkg sorts
                  # ABOVE any later 1.41.0-N+debNNuM build. Stay consistent
                  # with ethercat's release workflow.
                  base_ver=$(dpkg-parsechangelog --show-field Version)
                  new_ver="${base_ver}+${{ matrix.deb_rev }}"
                  dch --newversion "${new_ver}" \
                      --distribution stable \
                      "Release ${GITHUB_REF_NAME} for ${{ matrix.codename }}"

            - name: Build deb package
              run: |
                  touch TODO
                  dpkg-buildpackage -d -us -uc -b
                  mkdir -p dist
                  for src in ../*.deb; do
                      [ -f "$src" ] || continue
                      case "$src" in *-dbgsym*) continue ;; esac
                      cp "$src" "dist/$(basename "$src")"
                  done

            - name: Run tests
              run: |
                  cd src
                  make test

            - name: Upload deb artifact
              uses: actions/upload-artifact@v7
              with:
                  name: linuxcnc-ethercat-deb-${{ matrix.distro }}
                  path: dist/*.deb
                  if-no-files-found: error

    release:
        name: Attach debs to GitHub release
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download all artefacts
              uses: actions/download-artifact@v8
              with:
                  path: artifacts

            - name: List artefacts
              run: find artifacts -type f -name '*.deb' -print

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/**/*.deb
                  generate_release_notes: true
                  prerelease: ${{ contains(github.ref_name, '~pre') || contains(github.ref_name, '-pre') }}

            - name: Trigger apt-repo ingestion
              env:
                  GH_TOKEN: ${{ secrets.APT_DISPATCH_TOKEN }}
              run: |
                  if [ -z "$GH_TOKEN" ]; then
                      echo "APT_DISPATCH_TOKEN not set; skipping ingestion dispatch."
                      exit 0
                  fi
                  gh api \
                      -X POST \
                      -H "Accept: application/vnd.github+json" \
                      /repos/linuxcnc-ethercat/apt/dispatches \
                      -f event_type=ingest-release \
                      -f "client_payload[source_repo]=${{ github.repository }}" \
                      -f "client_payload[tag]=${{ github.ref_name }}"
