---
name: Build CI

on:
    push:
        branches: [master]
    pull_request:
    release:
        types: [published]

permissions:
    contents: read

jobs:
    build-deb:
        runs-on: ubuntu-latest
        container:
            image: debian:trixie
        steps:
            - name: Install build dependencies
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends \
                      git build-essential devscripts debhelper \
                      linuxcnc-uspace-dev etherlabmaster-dev \
                      golang-go yapps2

            - name: Checkout
              uses: actions/checkout@v4

            - name: Build deb package
              run: |
                  touch TODO
                  dpkg-buildpackage -d -us -uc -b

            - name: Run tests
              run: |
                  cd src
                  make test

            - name: Upload deb artifact
              uses: actions/upload-artifact@v4
              with:
                  name: linuxcnc-ethercat-deb
                  path: |
                      ../*.deb
                      !../*-dbgsym*.deb
